<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A332D">
<title>叶家新加坡之旅 · The Ye Family Singapore Voyage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F1E4;
    --paper:#FBF8F0;
    --ink:#16302B;
    --ink-soft:#3E5850;
    --teal:#0F4C43;
    --teal-deep:#0A332D;
    --gold:#E3A93B;
    --coral:#D65F4C;
    --mist:#D7E6E0;
    --line:rgba(22,48,43,0.14);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter','Noto Sans SC',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{-webkit-appearance:none;appearance:none;}
  h1,h2,h3,.display{
    font-family:'Fraunces','Noto Sans SC',serif;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0;
  }
  .mono{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.01em;
  }
  a{color:inherit;}
  .wrap{max-width:920px;margin:0 auto;padding:0 24px;}

  /* ---------- LANG TOGGLE ---------- */
  .lang-toggle{
    position:fixed;
    top:calc(14px + env(safe-area-inset-top));
    right:calc(14px + env(safe-area-inset-right));
    z-index:100;
    display:flex;
    background:rgba(11,51,45,0.85);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:100px;
    padding:3px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .lang-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:0.04em;
    padding:8px 14px;
    min-height:34px;
    border-radius:100px;
    border:none;
    background:none;
    color:#B9D2CA;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease;
    touch-action:manipulation;
  }
  .lang-btn.active{
    background:var(--gold);
    color:var(--teal-deep);
    font-weight:600;
  }

  /* ---------- HERO ---------- */
  .hero{
    background:radial-gradient(120% 140% at 50% -10%, #145349 0%, var(--teal-deep) 55%, #081F1B 100%);
    color:var(--paper);
    padding:64px 0 56px;
    position:relative;
    overflow:hidden;
  }
  .hero .wrap{position:relative;z-index:2;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:1px;background:var(--gold);
    display:inline-block;
  }
  .hero h1{
    font-size:clamp(34px,6vw,58px);
    line-height:1.08;
    max-width:14ch;
  }
  .hero h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--gold);
  }
  [lang-zh] .hero h1 em{font-style:normal;}
  .hero-sub{
    margin-top:18px;
    max-width:46ch;
    font-size:16.5px;
    line-height:1.6;
    color:#CFE3DD;
  }
  .flightmap{
    margin-top:44px;
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }
  .flightmap svg{width:100%;height:auto;display:block;}
  .route-caption{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:#9DBDB3;
    margin-top:6px;
    flex-wrap:wrap;
    gap:6px;
  }
  .route-caption span b{color:var(--paper);font-weight:600;}

  .party-row{
    margin-top:36px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:100px;
    padding:7px 14px 7px 7px;
    font-size:13.5px;
  }
  .chip .dot{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:600;
    color:var(--teal-deep);
  }
  .dot.gold{background:var(--gold);}
  .dot.coral{background:var(--coral);color:var(--paper);}

  /* ---------- PHASE TRACKER ---------- */
  .phase-band{
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:22px 0;
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(6px);
  }
  .phase-track{
    display:flex;
    align-items:center;
    gap:0;
  }
  .phase-node{
    flex:1;
    text-align:center;
    position:relative;
    padding-top:22px;
    cursor:pointer;
    background:none;
    border:none;
    font-family:'Inter',sans-serif;
  }
  .phase-node::before{
    content:"";
    position:absolute;
    top:6px;left:50%;
    width:11px;height:11px;
    border-radius:50%;
    background:var(--paper);
    border:2.5px solid var(--teal);
    transform:translateX(-50%);
    z-index:2;
  }
  .phase-node::after{
    content:"";
    position:absolute;
    top:11px;left:-50%;
    width:100%;height:2px;
    background:var(--line);
    z-index:1;
  }
  .phase-node:first-child::after{display:none;}
  .phase-label{
    font-size:10.5px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .phase-title{
    font-family:'Fraunces','Noto Sans SC',serif;
    font-weight:600;
    font-size:15px;
    margin-top:3px;
    color:var(--ink);
  }
  .phase-dates{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  /* ---------- SECTIONS ---------- */
  section{padding:52px 0;}
  .section-head{
    display:flex;
    align-items:baseline;
    gap:16px;
    margin-bottom:28px;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
  }
  .section-num{
    font-family:'JetBrains Mono',monospace;
    color:var(--coral);
    font-size:13px;
  }
  .section-head h2{font-size:26px;}

  /* ---------- DAY CARDS ---------- */
  .day-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-bottom:14px;
    overflow:hidden;
    position:relative;
  }
  .day-summary{
    display:flex;
    align-items:center;
    gap:18px;
    padding:18px 20px;
    cursor:pointer;
    user-select:none;
  }
  .day-date{
    font-family:'JetBrains Mono',monospace;
    text-align:center;
    min-width:56px;
    line-height:1.15;
  }
  .day-date .num{font-size:22px;font-weight:600;color:var(--teal);}
  .day-date .mo{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;}
  .day-main{flex:1;min-width:0;}
  .day-tag{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:100px;
    margin-bottom:6px;
  }
  .tag-andaz{background:#E7DFC9;color:#6B5A24;}
  .tag-cruise{background:#D7E6E0;color:var(--teal);}
  .tag-hyatt{background:#F0D9CE;color:#9C4630;}
  .day-title{font-family:'Fraunces','Noto Sans SC',serif;font-weight:600;font-size:17px;}
  .day-highlight{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .day-toggle{
    font-family:'JetBrains Mono',monospace;
    font-size:18px;
    color:var(--ink-soft);
    transition:transform 0.25s ease;
    flex-shrink:0;
  }
  .day-card.open .day-toggle{transform:rotate(45deg);}
  .day-detail{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease;
    border-top:1px dashed var(--line);
  }
  .day-card.open .day-detail{max-height:900px;}
  .schedule{
    padding:6px 20px 20px;
    display:grid;
    gap:0;
  }
  .slot{
    display:grid;
    grid-template-columns:96px 1fr;
    gap:14px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .slot:last-child{border-bottom:none;}
  .slot-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--coral);
    padding-top:2px;
  }
  .slot-text{font-size:14.5px;line-height:1.55;color:var(--ink);}
  .slot-text b{font-weight:600;}
  .day-map{
    margin:4px 20px 18px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .day-map iframe{
    width:100%;
    height:190px;
    border:0;
    display:block;
    filter:grayscale(0.15) contrast(1.02);
  }
  .day-map-links{
    display:flex;
  }
  .day-map-link{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--teal);
    background:var(--mist);
    padding:9px 10px;
    text-decoration:none;
    border-top:1px solid var(--line);
    text-align:center;
  }
  .day-map-link + .day-map-link{
    border-left:1px solid var(--line);
  }
  .day-map-link:active{opacity:0.7;}

  .note-banner{
    margin:0 20px 18px;
    background:var(--mist);
    border-left:3px solid var(--teal);
    border-radius:6px;
    padding:10px 14px;
    font-size:13px;
    color:var(--ink-soft);
  }

  /* ---------- GUIDE TABS (Food / Attractions) ---------- */
  .guide-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
  }
  .guide-tab-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    padding:9px 18px;
    min-height:40px;
    border-radius:100px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    cursor:pointer;
    touch-action:manipulation;
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .guide-tab-btn.active{
    background:var(--teal);
    border-color:var(--teal);
    color:var(--paper);
  }
  .guide-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .guide-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .guide-card .g-day{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--coral);
    background:var(--mist);
    border-radius:100px;
    padding:3px 9px;
    flex-shrink:0;
    white-space:nowrap;
    margin-top:2px;
  }
  .guide-card .g-body h4{
    font-family:'Fraunces','Noto Sans SC',serif;
    font-weight:600;
    font-size:15px;
    margin:0 0 3px;
  }
  .guide-card .g-body p{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.5;
    margin:0;
  }

  /* ---------- INFO CARDS ---------- */
  .info-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .info-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
  }
  .info-card .k{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--coral);
    margin-bottom:8px;
  }
  .info-card h3{font-size:18px;margin-bottom:8px;}
  .info-card p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:4px 0;}

  /* ---------- CHECKLIST ---------- */
  .checklist{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 32px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 24px;
  }
  .check-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .check-item input{
    width:17px;height:17px;
    accent-color:var(--teal);
    flex-shrink:0;
  }
  .check-item.checked span{
    text-decoration:line-through;
    color:var(--ink-soft);
  }

  /* ---------- TIPS ---------- */
  .tips-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }
  .tip{
    background:var(--teal);
    color:var(--paper);
    border-radius:var(--radius);
    padding:20px;
  }
  .tip .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;color:var(--gold);letter-spacing:0.07em;margin-bottom:8px;}
  .tip p{font-size:13.5px;line-height:1.6;color:#D8E9E3;margin:0;}

  footer{
    padding:36px 0 60px;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
  }

  footer{padding-bottom:calc(36px + env(safe-area-inset-bottom));}

  @media (max-width:720px){
    .wrap{padding:0 18px;}
    .hero{padding:calc(56px + env(safe-area-inset-top)) 0 44px;}
    .info-grid{grid-template-columns:1fr;}
    .guide-grid{grid-template-columns:1fr;}
    .checklist{grid-template-columns:1fr;}
    .tips-grid{grid-template-columns:1fr;}
    .phase-label,.phase-dates{display:none;}
    .phase-band{padding:16px 0;}
    .slot{grid-template-columns:66px 1fr;gap:10px;}
    section{padding:40px 0;}
    .day-summary{padding:16px 14px;gap:12px;min-height:44px;}
    .day-toggle{font-size:22px;}
    .check-item{padding:12px 0;min-height:44px;}
    .check-item input{width:20px;height:20px;}
    .info-card,.checklist{padding:18px;}
  }

  @media (max-width:400px){
    .hero h1{font-size:30px;max-width:11ch;}
    .hero-sub{font-size:15px;}
    .eyebrow{font-size:11px;}
    .flightmap text{font-size:9.5px;}
    .chip{font-size:12.5px;padding:6px 12px 6px 6px;}
    .day-title{font-size:15.5px;}
    .lang-btn{padding:7px 11px;font-size:12px;}
  }

  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    .day-detail,.day-toggle{transition:none;}
  }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btnZh" onclick="setLang('zh')">中文</button>
</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <div class="wrap">
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 data-i18n-html="h1"></h1>
    <p class="hero-sub" data-i18n="heroSub"></p>

    <div class="flightmap">
      <svg viewBox="0 0 800 220" preserveAspectRatio="xMidYMid meet">
        <path d="M 90 40 C 300 40, 480 160, 690 178" fill="none" stroke="rgba(227,169,59,0.35)" stroke-width="1.5" stroke-dasharray="4 5"/>
        <path d="M 90 190 C 300 190, 480 120, 690 178" fill="none" stroke="rgba(214,95,76,0.35)" stroke-width="1.5" stroke-dasharray="4 5"/>

        <circle cx="90" cy="40" r="5" fill="#E3A93B"/>
        <text x="105" y="35" fill="#CFE3DD" font-family="JetBrains Mono, monospace" font-size="12" data-i18n="harbinLabel"></text>
        <text x="105" y="50" fill="#7FA599" font-family="JetBrains Mono, monospace" font-size="10.5" data-i18n="harbinTime"></text>

        <circle cx="90" cy="190" r="5" fill="#D65F4C"/>
        <text x="105" y="185" fill="#CFE3DD" font-family="JetBrains Mono, monospace" font-size="12" data-i18n="shanghaiLabel"></text>
        <text x="105" y="200" fill="#7FA599" font-family="JetBrains Mono, monospace" font-size="10.5" data-i18n="shanghaiTime"></text>

        <circle cx="690" cy="178" r="7" fill="#F6F1E4"/>
        <circle cx="690" cy="178" r="12" fill="none" stroke="#F6F1E4" stroke-width="1">
          <animate attributeName="r" values="10;22;10" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="670" y="205" fill="#F6F1E4" font-family="Fraunces, serif" font-weight="600" font-size="14" text-anchor="middle">SIN</text>

        <g fill="#E3A93B">
          <path d="M0,-3 L6,0 L0,3 L1,0 Z" transform="translate(90,40)">
            <animateMotion dur="4.5s" repeatCount="indefinite" path="M 0 0 C 210 0, 390 120, 600 138"/>
          </path>
        </g>
        <g fill="#D65F4C">
          <path d="M0,-3 L6,0 L0,3 L1,0 Z" transform="translate(90,190)">
            <animateMotion dur="4.5s" repeatCount="indefinite" path="M 0 0 C 210 0, 390 -70, 600 -12"/>
          </path>
        </g>
      </svg>
      <div class="route-caption">
        <span data-i18n="routeCaption1"></span>
        <span data-i18n-html="routeCaption2"></span>
      </div>
    </div>

    <div class="party-row" id="partyRow"></div>
  </div>
</div>

<!-- ================= PHASE TRACKER ================= -->
<div class="phase-band">
  <div class="wrap">
    <div class="phase-track">
      <button class="phase-node" onclick="scrollToPhase('andaz')">
        <div class="phase-label" data-i18n="stayLabel"></div>
        <div class="phase-title">Andaz</div>
        <div class="phase-dates" data-i18n="andazDates"></div>
      </button>
      <button class="phase-node" onclick="scrollToPhase('cruise')">
        <div class="phase-label" data-i18n="sailLabel"></div>
        <div class="phase-title" data-i18n="cruiseTitle"></div>
        <div class="phase-dates" data-i18n="cruiseDates"></div>
      </button>
      <button class="phase-node" onclick="scrollToPhase('hyatt')">
        <div class="phase-label" data-i18n="stayLabel"></div>
        <div class="phase-title">Grand Hyatt</div>
        <div class="phase-dates" data-i18n="hyattDates"></div>
      </button>
    </div>
  </div>
</div>

<!-- ================= ITINERARY ================= -->
<section id="itinerary">
  <div class="wrap">
    <div class="section-head">
      <span class="section-num">01</span>
      <h2 data-i18n="itineraryTitle"></h2>
    </div>
    <div id="dayList"></div>
  </div>
</section>

<!-- ================= FOOD / ATTRACTIONS GUIDE ================= -->
<section id="guide" style="background:var(--mist);">
  <div class="wrap">
    <div class="section-head">
      <span class="section-num">02</span>
      <h2 data-i18n="guideTitle"></h2>
    </div>
    <div class="guide-tabs" id="guideTabs"></div>
    <div class="guide-grid" id="guideGrid"></div>
  </div>
</section>

<!-- ================= STAYS & CRUISE ================= -->
<section id="stays">
  <div class="wrap">
    <div class="section-head">
      <span class="section-num">03</span>
      <h2 data-i18n="staysTitle"></h2>
    </div>
    <div class="info-grid" id="infoGrid"></div>
  </div>
</section>

<!-- ================= CHECKLIST ================= -->
<section id="packing">
  <div class="wrap">
    <div class="section-head">
      <span class="section-num">04</span>
      <h2 data-i18n="packingTitle"></h2>
    </div>
    <div class="checklist" id="checklist"></div>
  </div>
</section>

<!-- ================= TIPS ================= -->
<section id="tips" style="padding-top:0;">
  <div class="wrap">
    <div class="section-head">
      <span class="section-num">05</span>
      <h2 data-i18n="tipsTitle"></h2>
    </div>
    <div class="tips-grid" id="tipsGrid"></div>
  </div>
</section>

<footer data-i18n="footer"></footer>

<script>

function mapEmbedUrl(query){
  return `https://www.google.com/maps?q=${encodeURIComponent(query)}&output=embed`;
}
function amapSearchUrl(query){
  return `https://uri.amap.com/search?keyword=${encodeURIComponent(query)}`;
}
function mapsDirUrl(stops){
  if (stops.length === 1) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stops[0])}`;
  const origin = stops[0], destination = stops[stops.length-1], mid = stops.slice(1,-1);
  let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}`;
  if (mid.length) url += `&waypoints=${encodeURIComponent(mid.join('|'))}`;
  return url;
}

let currentLang = 'en';
let currentGuideTab = 'food';

function renderGuide(L){
  const tabs = document.getElementById('guideTabs');
  tabs.innerHTML = `
    <button class="guide-tab-btn ${currentGuideTab==='food' ? 'active':''}" onclick="setGuideTab('food')">${L.tabFood}</button>
    <button class="guide-tab-btn ${currentGuideTab==='attractions' ? 'active':''}" onclick="setGuideTab('attractions')">${L.tabAttractions}</button>
    <button class="guide-tab-btn ${currentGuideTab==='backup' ? 'active':''}" onclick="setGuideTab('backup')">${L.tabBackup}</button>
  `;
  const items = currentGuideTab === 'food' ? L.food : currentGuideTab === 'attractions' ? L.attractions : L.backup;
  const grid = document.getElementById('guideGrid');
  grid.innerHTML = items.map(it => `
    <div class="guide-card">
      <span class="g-day">${it.day || it.tag}</span>
      <div class="g-body"><h4>${it.name}</h4><p>${it.note}</p></div>
    </div>`).join('');
}

function setGuideTab(tab){
  currentGuideTab = tab;
  renderGuide(t[currentLang]);
}

function renderAll(){
  const L = t[currentLang];

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = L[el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    el.innerHTML = L[el.dataset.i18nHtml];
  });

  // party chips
  const partyRow = document.getElementById('partyRow');
  partyRow.innerHTML = L.party.map(p=>`<div class="chip"><span class="dot ${p.cls}">${p.dot}</span>${p.name}</div>`).join('');

  // food / attractions guide tabs
  renderGuide(L);

  // info cards
  const infoGrid = document.getElementById('infoGrid');
  infoGrid.innerHTML = L.info.map(c=>`
    <div class="info-card" id="${c.id}">
      <div class="k">${c.k}</div>
      <h3>${c.title}</h3>
      ${c.p.map(pp=>`<p>${pp}</p>`).join('')}
    </div>`).join('');

  // checklist — preserve checked state across language switch
  const checklist = document.getElementById('checklist');
  const prevChecked = Array.from(checklist.querySelectorAll('input')).map(i=>i.checked);
  checklist.innerHTML = L.packing.map((item,i)=>`
    <label class="check-item${prevChecked[i] ? ' checked':''}">
      <input type="checkbox" ${prevChecked[i] ? 'checked':''} onchange="this.parentElement.classList.toggle('checked', this.checked)">
      <span>${item}</span>
    </label>`).join('');

  // tips
  const tipsGrid = document.getElementById('tipsGrid');
  tipsGrid.innerHTML = L.tips.map(tp=>`
    <div class="tip"><div class="k">${tp.k}</div><p>${tp.p}</p></div>`).join('');

  // day cards — preserve open state
  const dayList = document.getElementById('dayList');
  const prevOpen = Array.from(dayList.querySelectorAll('.day-card')).map(c=>c.classList.contains('open'));
  dayList.innerHTML = '';
  L.days.forEach((d,i)=>{
    const card = document.createElement('div');
    card.className = 'day-card' + ((prevOpen[i] || (prevOpen.length===0 && i===0)) ? ' open' : '');
    const dm = dayStops[i];
    card.innerHTML = `
      <div class="day-summary" onclick="this.parentElement.classList.toggle('open')">
        <div class="day-date"><div class="num">${d.date}</div><div class="mo">${d.mo}</div></div>
        <div class="day-main">
          <span class="day-tag tag-${d.tag}">${d.tagLabel}</span>
          <div class="day-title">${d.title}</div>
          <div class="day-highlight">${d.highlight}</div>
        </div>
        <div class="day-toggle">+</div>
      </div>
      <div class="day-detail">
        ${d.note ? `<div class="note-banner">${d.note}</div>` : ''}
        ${dm ? `<div class="day-map">
          <iframe src="${mapEmbedUrl(dm.center)}" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          <div class="day-map-links">
            <a class="day-map-link" href="${mapsDirUrl(dm.stops)}" target="_blank" rel="noopener">🗺️ ${L.openMap}</a>
            <a class="day-map-link" href="${amapSearchUrl(dm.center)}" target="_blank" rel="noopener">📍 ${L.openAmap}</a>
          </div>
        </div>` : ''}
        <div class="schedule">
          ${d.slots.map(s => `
            <div class="slot">
              <div class="slot-label">${s[0]}</div>
              <div class="slot-text">${s[1]}</div>
            </div>`).join('')}
        </div>
      </div>`;
    dayList.appendChild(card);
  });

  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('btnEn').classList.toggle('active', currentLang==='en');
  document.getElementById('btnZh').classList.toggle('active', currentLang==='zh');
}

function setLang(lang){
  currentLang = lang;
  renderAll();
}

function scrollToPhase(id){
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

renderAll();
